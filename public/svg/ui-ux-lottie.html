<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI UX Lottie</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
      }

      #container {
        width: 100%;
        height: 100%;
      }

      dotlottie-player {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/npm/@dotlottie/player-component@v1.3.0/dist/dotlottie-player.js"
      defer
    ></script>
  </head>
  <body>
    <div id="container">
      <dotlottie-player
        src="https://lottie.host/134d5909-676e-487a-9158-af43eb3bbceb/wBUyrzH5Un.lottie"
        background="transparent"
        speed="1"
        loop
        autoplay
      ></dotlottie-player>
    </div>
  </body>
</html>
